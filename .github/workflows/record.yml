name: biliflow-record

on:
  workflow_dispatch:
    inputs:
      room_id:
        description: "Bilibili room id"
        required: true
        type: string
      session_id:
        description: "session id"
        required: false
        type: string
        default: ""
      segment_index:
        description: "segment index"
        required: false
        type: string
        default: "1"
      live_title:
        description: "live title"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  actions: write

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    env:
      ROOM_ID: ${{ inputs.room_id }}
      SESSION_ID_INPUT: ${{ inputs.session_id }}
      SEGMENT_INDEX_INPUT: ${{ inputs.segment_index }}
      LIVE_TITLE_INPUT: ${{ inputs.live_title }}
      MAX_RECORD_SECONDS: ${{ vars.MAX_RECORD_SECONDS || '19800' }}
      BILIUP_BIN: ${{ github.workspace }}/.tools/biliup
      BILIUP_DOWNLOAD_URL: ${{ vars.BILIUP_DOWNLOAD_URL }}
      BILIUP_USER_COOKIE_JSON: ${{ secrets.BILIUP_USER_COOKIE_JSON }}
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
      YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
      YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
      YOUTUBE_PRIVACY_STATUS: public
      YOUTUBE_CATEGORY_ID: ${{ vars.YOUTUBE_CATEGORY_ID || '20' }}
      YOUTUBE_CHANNEL_TAGS: ${{ vars.YOUTUBE_CHANNEL_TAGS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install websockets brotli google-api-python-client google-auth

      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Initialize paths
        id: init
        run: |
          session_id="${SESSION_ID_INPUT}"
          if [ -z "${session_id}" ]; then
            session_id="$(date -u +%Y%m%dT%H%M%SZ)-room${ROOM_ID}"
          fi
          segment_index="${SEGMENT_INDEX_INPUT:-1}"
          segment_padded="$(printf '%04d' "${segment_index}")"
          segment_id="seg-${segment_padded}"
          run_root="${GITHUB_WORKSPACE}/output/${session_id}/${segment_id}"
          release_dir="${run_root}/release"
          logs_dir="${run_root}/logs"
          raw_jsonl="${run_root}/danmaku.raw.jsonl"
          mkdir -p "${release_dir}" "${logs_dir}"
          {
            echo "session_id=${session_id}"
            echo "segment_index=${segment_index}"
            echo "segment_id=${segment_id}"
            echo "run_root=${run_root}"
            echo "release_dir=${release_dir}"
            echo "logs_dir=${logs_dir}"
            echo "raw_jsonl=${raw_jsonl}"
          } >> "${GITHUB_OUTPUT}"

      - name: Refresh live info
        id: live
        run: scripts/check_live.sh

      - name: Stop when room is offline
        if: steps.live.outputs.is_live != 'true'
        run: echo "派发时已下播，跳过本次录制。"

      - name: Bootstrap biliup-rs
        if: steps.live.outputs.is_live == 'true'
        id: biliup
        run: scripts/bootstrap_biliup.sh

      - name: Start danmaku capture
        if: steps.live.outputs.is_live == 'true'
        working-directory: ${{ steps.init.outputs.run_root }}
        env:
          RAW_JSONL: ${{ steps.init.outputs.raw_jsonl }}
        run: |
          nohup python "${GITHUB_WORKSPACE}/scripts/capture_danmaku.py" \
            --room-id "${ROOM_ID}" \
            --output "${RAW_JSONL}" \
            > "${{ steps.init.outputs.logs_dir }}/capture.log" 2>&1 &
          echo $! > "${{ steps.init.outputs.run_root }}/capture.pid"

      - name: Record live segment
        if: steps.live.outputs.is_live == 'true'
        id: record
        continue-on-error: true
        env:
          OUTPUT_DIR: ${{ steps.init.outputs.run_root }}
        run: scripts/record.sh

      - name: Stop danmaku capture
        if: always() && steps.live.outputs.is_live == 'true'
        run: |
          pid_file="${{ steps.init.outputs.run_root }}/capture.pid"
          if [ -f "${pid_file}" ]; then
            capture_pid="$(cat "${pid_file}")"
            kill -INT "${capture_pid}" 2>/dev/null || true
            wait "${capture_pid}" 2>/dev/null || true
          fi

      - name: Convert danmaku outputs
        if: always() && steps.live.outputs.is_live == 'true'
        env:
          INPUT_FILE: ${{ steps.init.outputs.raw_jsonl }}
          OUTPUT_DIR: ${{ steps.init.outputs.release_dir }}
          SESSION_ID: ${{ steps.init.outputs.session_id }}
          SEGMENT_INDEX: ${{ steps.init.outputs.segment_index }}
          LIVE_TITLE: ${{ steps.live.outputs.live_title }}
          ANCHOR_NAME: ${{ steps.live.outputs.anchor_name }}
        run: |
          python scripts/convert_danmaku.py \
            --input "${INPUT_FILE}" \
            --output-dir "${OUTPUT_DIR}" \
            --room-id "${ROOM_ID}" \
            --session-id "${SESSION_ID}" \
            --segment-index "${SEGMENT_INDEX}" \
            --live-title "${LIVE_TITLE}" \
            --anchor-name "${ANCHOR_NAME}"

      - name: Build release metadata
        if: always() && steps.live.outputs.is_live == 'true'
        id: meta
        env:
          SESSION_ID: ${{ steps.init.outputs.session_id }}
          SEGMENT_INDEX: ${{ steps.init.outputs.segment_index }}
          RELEASE_DIR: ${{ steps.init.outputs.release_dir }}
          LIVE_TITLE: ${{ steps.live.outputs.live_title }}
          ANCHOR_NAME: ${{ steps.live.outputs.anchor_name }}
        run: |
          release_tag="room${ROOM_ID}-${SESSION_ID}-seg${SEGMENT_INDEX}"
          release_title="${ANCHOR_NAME:-主播} - ${LIVE_TITLE:-直播录制} - 第 ${SEGMENT_INDEX} 段"
          notes_file="${RELEASE_DIR}/release-notes.md"
          cat > "${notes_file}" <<EOF
          # ${release_title}

          - 房间号：${ROOM_ID}
          - 会话：${SESSION_ID}
          - 分段：${SEGMENT_INDEX}
          - 主播：${ANCHOR_NAME}
          - 直播标题：${LIVE_TITLE}
          - 生成时间：$(date -u +%Y-%m-%dT%H:%M:%SZ)

          附件包含：

          - danmaku.xml
          - danmaku.ass
          - danmaku.jsonl
          - danmaku.csv
          - search-index.json
          - summary.json
          - danmaku.srt（若生成成功）
          EOF
          {
            echo "release_tag=${release_tag}"
            echo "release_title=${release_title}"
            echo "notes_file=${notes_file}"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish release assets
        if: always() && steps.live.outputs.is_live == 'true'
        id: release
        env:
          RELEASE_TAG: ${{ steps.meta.outputs.release_tag }}
          RELEASE_TITLE: ${{ steps.meta.outputs.release_title }}
          RELEASE_DIR: ${{ steps.init.outputs.release_dir }}
          RELEASE_NOTES_FILE: ${{ steps.meta.outputs.notes_file }}
        run: scripts/publish_release.sh

      - name: Build YouTube description
        if: always() && steps.live.outputs.is_live == 'true'
        id: description
        env:
          RELEASE_URL: ${{ steps.release.outputs.release_url }}
          SESSION_ID: ${{ steps.init.outputs.session_id }}
          SEGMENT_INDEX: ${{ steps.init.outputs.segment_index }}
          LIVE_TITLE: ${{ steps.live.outputs.live_title }}
          ANCHOR_NAME: ${{ steps.live.outputs.anchor_name }}
        run: |
          description_file="${{ steps.init.outputs.run_root }}/youtube-description.txt"
          cat > "${description_file}" <<EOF
          ${ANCHOR_NAME:-主播} 的 B 站直播录制

          直播标题：${LIVE_TITLE}
          房间号：${ROOM_ID}
          会话：${SESSION_ID}
          分段：${SEGMENT_INDEX}

          弹幕下载：
          ${RELEASE_URL}

          文件包含：
          - XML：适配 danmaku-anywhere
          - ASS：本地播放器弹幕
          - JSONL/CSV：原始弹幕与搜索导出
          - search-index.json：搜索索引
          - summary.json：本段统计摘要
          EOF
          echo "description_file=${description_file}" >> "${GITHUB_OUTPUT}"

      - name: Upload video to YouTube
        if: always() && steps.live.outputs.is_live == 'true' && steps.record.outputs.video_path != '' && env.YOUTUBE_CLIENT_ID != '' && env.YOUTUBE_CLIENT_SECRET != '' && env.YOUTUBE_REFRESH_TOKEN != ''
        id: youtube
        env:
          VIDEO_FILE: ${{ steps.record.outputs.video_path }}
          VIDEO_TITLE: ${{ steps.live.outputs.anchor_name }} - ${{ steps.live.outputs.live_title }} - 第 ${{ steps.init.outputs.segment_index }} 段
          VIDEO_DESCRIPTION_FILE: ${{ steps.description.outputs.description_file }}
        run: |
          python scripts/upload_youtube.py \
            --file "${VIDEO_FILE}" \
            --title "${VIDEO_TITLE}" \
            --description-file "${VIDEO_DESCRIPTION_FILE}" \
            --privacy-status "${YOUTUBE_PRIVACY_STATUS}" \
            --category-id "${YOUTUBE_CATEGORY_ID}" \
            --tags "${YOUTUBE_CHANNEL_TAGS}"

      - name: Re-check live status for handoff
        if: steps.record.outputs.timed_out == 'true'
        id: recheck
        run: scripts/check_live.sh

      - name: Dispatch next segment
        if: steps.record.outputs.timed_out == 'true' && steps.recheck.outputs.is_live == 'true'
        env:
          SESSION_ID: ${{ steps.init.outputs.session_id }}
          SEGMENT_INDEX: ${{ steps.init.outputs.segment_index }}
          LIVE_TITLE: ${{ steps.recheck.outputs.live_title }}
        run: scripts/handoff.sh
